<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交成功 - 晶旺诚工贸</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #0a0e1a;
            color: #e0e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
        }
        .bg-orb:nth-child(1) {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #1a5fb4, transparent);
            top: -10%; left: -5%;
        }
        .bg-orb:nth-child(2) {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #0055aa, transparent);
            bottom: -5%; right: -5%;
        }
        .card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(100,180,255,0.12);
            border-radius: 24px;
            padding: 60px 48px;
            text-align: center;
            max-width: 480px;
            animation: fadeIn 0.8s ease;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 { font-size: 28px; margin-bottom: 12px; }
        p { color: #8aa0b8; line-height: 1.7; margin-bottom: 28px; }
        .btn {
            display: inline-block;
            padding: 14px 36px;
            border-radius: 12px;
            background: linear-gradient(135deg, #2d7dd2, #1a5fb4);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(45,125,210,0.5); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="card">
        <div class="icon">✅</div>
        <h1>提交成功！</h1>
        <p>感谢您的留言，<br>晶旺诚工贸团队会在 24 小时内与您联系。</p>
        <a href="/" class="btn">返回首页 →</a>
    </div>
</body>
</html>
